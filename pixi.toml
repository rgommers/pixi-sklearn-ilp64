[workspace]
preview = ["pixi-build"]
authors = ["Ralf Gommers <ralf.gommers@gmail.com>"]
channels = ["conda-forge"]
name = "scikit-learn"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
cython = ">=3.2.4,<4"
ninja = ">=1.13.2,<2"
pkg-config = ">=0.29.2,<0.30"
meson = ">=1.10.1,<2"
spin = "0.15.*"
pip = ">=26.0.1,<27"
meson-python = ">=0.19.0,<0.20"
numpy = ">=2.4.2,<3"
c-compiler = ">=1.11.0,<2"
cxx-compiler = ">=1.11.0,<2"
libgomp = ">=15.2.0,<16"
joblib = ">=1.5.3,<2"
threadpoolctl = ">=3.6.0,<4"
pytest = ">=9.0.2,<10"
pytest-xdist = ">=3.8.0,<4"
python-freethreading = ">=3.14.3,<4"
setuptools_scm = ">=9.2.2,<10"

# Feature: default scipy (OpenBLAS, LP64)
[feature.openblas.dependencies]
scipy = { path = "pixi-packages/scipy" }

[feature.openblas.tasks]
build = { cmd = "spin install", cwd = "scikit-learn", env = { CC = "ccache $CC", CXX = "ccache $CXX" } }
test = { cmd = "spin test --no-build", cwd = "scikit-learn" }

build-sm = { cmd = "pip install -e . --no-build-isolation -v", cwd = "statsmodels", env = { CC = "ccache $CC" } }
test-sm = { cmd = "pytest statsmodels -n4", cwd = "statsmodels" }

build-testpkg = { cmd = "pip install -e . --no-build-isolation -v -Cbuild-dir=$PIXI_PROJECT_ROOT/testpkg/build", cwd = "testpkg/ilp64_test_package" }
test-testpkg = { cmd = "pytest ilp64_test_package/tests", cwd = "testpkg" }

# Feature: ILP64 scipy (MKL)
[feature.mkl-ilp64.dependencies]
scipy = { path = "pixi-packages/scipy-ilp64" }

[feature.mkl-ilp64.tasks]
build-ilp64 = { cmd = "spin install -- -Cbuild-dir=build-ilp64", cwd = "scikit-learn", env = { CC = "ccache $CC", CXX = "ccache $CXX" } }
test-ilp64 = { cmd = "spin test --no-build", cwd = "scikit-learn" }

build-ilp64-sm = { cmd = "pip install -e . --no-build-isolation -v -Cbuild-dir=build-ilp64-sm", cwd = "statsmodels", env = { CC = "ccache $CC" } }
test-ilp64-sm = { cmd = "pytest statsmodels -n4", cwd = "statsmodels" }

build-ilp64-testpkg = { cmd = "pip install -e . --no-build-isolation -v -Cbuild-dir=$PIXI_PROJECT_ROOT/testpkg/build-ilp64", cwd = "testpkg/ilp64_test_package" }
test-ilp64-testpkg = { cmd = "pytest ilp64_test_package/tests/", cwd = "testpkg" }

[environments]
default = ["openblas"]
mkl-ilp64 = { features = ["mkl-ilp64"], solve-group = "mkl-ilp64" }
